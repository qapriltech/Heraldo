<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220">
  <!-- HERALDO PRESS - Variante BLANCHE pour fonds foncés -->
  <defs>
    <linearGradient id="goldGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5B85C"/>
      <stop offset="100%" stop-color="#B8862E"/>
    </linearGradient>
  </defs>

  <!-- Emblème circulaire -->
  <g transform="translate(110,110)">
    <circle cx="0" cy="0" r="88" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#goldGradW)" stroke-width="2"/>
    <rect x="-42" y="-42" width="14" height="84" fill="#FFFFFF"/>
    <rect x="-28" y="-7" width="38" height="14" fill="#FFFFFF"/>
    <path d="M 10 -42 L 10 42 L 42 56 L 42 -56 Z" fill="url(#goldGradW)"/>
    <path d="M 50 -22 Q 60 0 50 22" fill="none" stroke="url(#goldGradW)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 60 -32 Q 74 0 60 32" fill="none" stroke="url(#goldGradW)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M 70 -42 Q 88 0 70 42" fill="none" stroke="url(#goldGradW)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Wordmark BLANC -->
  <g transform="translate(230,0)">
    <text x="0" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700" fill="#FFFFFF" letter-spacing="6">HERALDO</text>
    <line x1="0" y1="138" x2="380" y2="138" stroke="url(#goldGradW)" stroke-width="2"/>
    <text x="0" y="172" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500" fill="#E5B85C" letter-spacing="14">PRESS</text>
    <text x="378" y="172" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#C5CDD5" letter-spacing="2" text-anchor="end" font-style="italic">Votre message, notre mission.</text>
  </g>
</svg>
